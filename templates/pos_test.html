<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shine Master POS</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#9C27B0,#F3E5F5);}
.wrapper{display:flex;height:100vh;}
/* LEFT PANEL */
.left{width:35%;background:#2c2c2c;color:white;padding:20px;box-sizing:border-box;}
.left label{display:block;margin-top:10px;font-weight:bold;}
.left input,.left select{width:100%;padding:10px;margin-bottom:10px;border:none;border-radius:8px;}
.time-box{background:#6A1B9A;text-align:center;padding:10px;margin-bottom:15px;font-size:18px;border-radius:8px;}
.service-buttons{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.service-buttons button{padding:10px;background:#9C27B0;color:white;border:none;border-radius:8px;font-weight:bold;cursor:pointer;}
.service-buttons button:hover{background:#7B1FA2;}

/* MIDDLE PANEL */
.middle{width:30%;background:#111;color:white;padding:20px;box-sizing:border-box;}
#price_display{font-size:38px;font-weight:bold;text-align:center;margin-bottom:15px;color:#00e676;background:#1c1c1c;padding:15px;border-radius:12px;}
.payment-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.pay-option{padding:14px;text-align:center;background:#2a2a2a;border-radius:10px;cursor:pointer;}
.pay-option.active{background:#ba55d3;font-weight:bold;}
.cash-box input{width:100%;padding:12px;border-radius:10px;border:none;background:#2a2a2a;color:#fff;font-size:14px;margin-top:5px;}
#balance_display{font-size:14px;color:#00e676;margin-top:5px;}
#qr_box{display:none;text-align:center;margin-top:10px;}
.pay-btn{width:100%;padding:14px;background:#9C27B0;color:white;border:none;border-radius:10px;margin-top:10px;cursor:pointer;}
.pay-btn:hover{background:#7B1FA2;}

/* RIGHT PANEL */
.right{width:35%;background:#fff;padding:20px;box-sizing:border-box;display:flex;flex-direction:column;}
.right h3{text-align:center;margin-bottom:10px;}
.right iframe{flex:1;width:100%;border:none;border-radius:8px;}
</style>
</head>
<body>

<div class="wrapper">

<!-- LEFT PANEL -->
<div class="left">
<div class="time-box" id="live_time"></div>

<label>Car Plate</label>
<input type="text" id="car_plate" onkeyup="checkLoyalty()">
<input type="text" id="loyalty_status" readonly placeholder="Loyalty Status">

<label>Car Type</label>
<select id="car_type" onchange="calculatePrice()">
<option value="Sedan">Sedan</option>
<option value="SUV_MPV">SUV/MPV</option>
<option value="LARGE-MPV_4X4">LARGE-MPV/4X4</option>
</select>

<div class="service-buttons">
<button onclick="selectService('wash_basic')">CAR WASH - BASIC</button>
<button onclick="selectService('wash_special')">CAR WASH - SPECIAL</button>
<button onclick="selectService('wash_maintain')">CAR WASH - MAINTAINANCE</button>
<button onclick="selectService('coat1')">COATING - 1 YEAR</button>
<button onclick="selectService('coat2')">COATING - 2 YEAR</button>
<button onclick="selectService('coat3')">COATING - 3 YEAR</button>
<button onclick="selectService('disp2')">DISPOSABLE - 2 YEAR</button>
<button onclick="selectService('disp3')">DISPOSABLE - 3 YEAR</button>
<button onclick="selectService('wax')">WAXING</button>
<button onclick="selectService('int_detail')">INTERIOR DETAILING</button>
<button onclick="selectService('int_coat')">INTERIOR COATING</button>
</div>
</div>

<!-- MIDDLE PANEL -->
<div class="middle">
<div id="price_display">RM 0.00</div>

<div class="payment-grid">
<div class="pay-option" onclick="selectPayment(this,'Cash')">💵 Cash</div>
<div class="pay-option" onclick="selectPayment(this,'Card')">💳 Card</div>
<div class="pay-option" onclick="selectPayment(this,'E-Wallet')">📱 E-Wallet</div>
<div class="pay-option" onclick="selectPayment(this,'QR Code')">🔳 QR Code</div>
</div>

<div class="cash-box" id="cash_box" style="display:none;">
<input type="number" id="cash_input" placeholder="Enter cash" oninput="calculateBalance()">
<div id="balance_display"></div>
</div>

<div id="qr_box">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=PAYMENT">
</div>

<button class="pay-btn" onclick="completePayment()">COMPLETE PAYMENT</button>
</div>

<!-- RIGHT PANEL -->
<div class="right">
<h3>Receipt</h3>
<iframe id="receipt_frame" name="receipt_frame"></iframe>
</div>

</div>

<script>
// Live time
setInterval(()=>{
document.getElementById('live_time').textContent = new Date().toLocaleString('en-MY');
},1000);

// Price table
const priceTable = {
wash_basic:{Sedan:20,SUV_MPV:24,"LARGE-MPV_4X4":28},
wash_special:{Sedan:48,SUV_MPV:58,"LARGE-MPV_4X4":68},
wash_maintain:{Sedan:98,SUV_MPV:108,"LARGE-MPV_4X4":118},
coat1:{Sedan:488,SUV_MPV:588,"LARGE-MPV_4X4":688},
coat2:{Sedan:688,SUV_MPV:788,"LARGE-MPV_4X4":888},
coat3:{Sedan:888,SUV_MPV:988,"LARGE-MPV_4X4":1088},
disp2:{Sedan:588,SUV_MPV:688,"LARGE-MPV_4X4":788},
disp3:{Sedan:788,SUV_MPV:888,"LARGE-MPV_4X4":988},
wax:{Sedan:288,SUV_MPV:388,"LARGE-MPV_4X4":488},
int_detail:{Sedan:188,SUV_MPV:288,"LARGE-MPV_4X4":388},
int_coat:{Sedan:288,SUV_MPV:388,"LARGE-MPV_4X4":488}
};

let selectedService=null;
let selectedPayment=null;

// Service
function selectService(service){selectedService=service;calculatePrice();}

// Price
function calculatePrice(){
    const carType=document.getElementById('car_type').value;
    if(selectedService){
        let price=priceTable[selectedService][carType];
        document.getElementById('price_display').textContent="RM "+price.toFixed(2);
    } else document.getElementById('price_display').textContent="RM 0.00";
}

// Loyalty
async function checkLoyalty(){
    const plate=document.getElementById('car_plate').value;
    const box=document.getElementById('loyalty_status');
    if(plate.length<3){ box.value=""; box.style.background='#2c2c2c'; return; }
    const res=await fetch('/check_loyalty/'+plate);
    const data=await res.json();
    if(data.eligible){ box.value='Eligible for FREE Car Wash'; box.style.background='#b8f5b1'; }
    else{ const remaining=5-data.paid; box.value='Not Eligible ('+remaining+' more wash)'; box.style.background='#ffd6d6'; }
}

// Payment selection
function selectPayment(el,method){
    document.querySelectorAll('.pay-option').forEach(b=>b.classList.remove('active'));
    el.classList.add('active'); selectedPayment=method;
    document.getElementById('cash_box').style.display=(method==='Cash')?'block':'none';
    document.getElementById('qr_box').style.display=(method==='E-Wallet'||method==='QR Code')?'block':'none';
}

// Cash balance
function calculateBalance(){
    let total=parseFloat(document.getElementById('price_display').textContent.replace('RM',''))||0;
    let cash=parseFloat(document.getElementById('cash_input').value)||0;
    let balance=cash-total;
    document.getElementById('balance_display').textContent=balance>=0?"Balance: RM "+balance.toFixed(2):"Insufficient amount";
}

// Complete payment → POST to iframe
function completePayment(){
    if(!selectedService||!selectedPayment){alert("Missing input"); return;}
    const plate=document.getElementById('car_plate').value;
    const carType=document.getElementById('car_type').value;
    const price=priceTable[selectedService][carType];

    const form=document.createElement("form");
    form.method="POST";
    form.action="/pos_test";       // Flask route returns receipt.html
    form.target="receipt_frame";

    const data={car_plate:plate, car_type:carType, service_type:selectedService, price:price, payment_method:selectedPayment};
    for(let key in data){
        const input=document.createElement("input");
        input.type="hidden"; input.name=key; input.value=data[key]; form.appendChild(input);
    }

    document.body.appendChild(form);
    form.submit();
}
</script>
</body>
</html>
