<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shine Master Solution - Booking</title>

<style>

/* ===== BODY ===== */
body {
    font-family: Arial, sans-serif;
    color: #fff;
    margin: 0;

    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;

    background: #0d001a;
}

/* ===== PAGE ===== */
.page {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    position: relative;
    z-index: 1;
}

/* ===== PROMO ===== */
.promo-badge {
    background: linear-gradient(90deg,#9c27b0,#ffeb3b);
    color: black;
    font-weight: bold;
    text-align: center;
    padding: 8px;
    letter-spacing: 1px;
    animation: pulseBadge 1.5s infinite;

    width: 100%;
    box-sizing: border-box;

    border-radius: 12px 12px 0 0;
    border: 2px solid #ffeb3b;
    border-bottom: none;
}

@keyframes pulseBadge {
    0% { opacity: 1; }
    50% { opacity: 0.7; }
    100% { opacity: 1; }
}

/* ===== HEADER FIX (BUG FIXED HERE) ===== */
.welcome-header {
    text-align: center;
    margin: 5px 0;
}

.welcome-header h1 {
    font-size: 26px;
    font-weight: 800;
    color: #A020F0;
    margin: 5px 0;
}

/* ===== CONTAINER ===== */
.container {
    width: 100%;
    background: #1a1a1a;
    padding: 20px;
    border-radius: 12px;
    border: 2px solid #ffeb3b;
    margin: 0;
    box-sizing: border-box;
}

/* ===== LABEL ===== */
label {
    margin-top: 15px;
    display: block;
    color: #ffeb3b;
    font-weight: bold;
}

/* ===== INPUT ===== */
input, select {
    width: 95%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 6px;
    border: 1px solid #9c27b0;
    background: #222;
    color: white;
}

/* ===== OPTIONS ===== */
.options {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.option {
    flex: 1;
    text-align: center;
    padding: 12px;
    border: 1px solid #9c27b0;
    border-radius: 8px;
    cursor: pointer;
}

.option.selected {
    background: #9c27b0;
}

/* ===== PRICE ===== */
.price-box {
    margin-top: 20px;
    text-align: center;
    font-size: 20px;
    color: #ffeb3b;
}

/* ===== BUTTON ===== */
button.submit-btn {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    background: linear-gradient(90deg,#9c27b0,#ffeb3b);
    border: none;
    font-weight: bold;
}

/* ===== CALENDAR ===== */
.calendar-wrapper {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
}

.calendar-track {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
}

.calendar-track::-webkit-scrollbar {
    display: none;
}

.day {
    min-width: 70px;
    padding: 10px;
    background: #222;
    border-radius: 10px;
    border: 1px solid #9c27b0;
    text-align: center;
    cursor: pointer;
}

.day.selected {
    background: #9c27b0;
}

.day.full {
    background: #333;
    opacity: 0.5;
    pointer-events: none;
}

/* ===== TIMESLOTS (FIX MISSING ISSUE) ===== */
.timeslots {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
}

.timeslot {
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #9c27b0;
    cursor: pointer;
}

.timeslot.selected {
    background: #9c27b0;
}

/* ===== MONTH HEADER ===== */
.calendar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 10px 0;
}

.month-label {
    font-size: 16px;
    font-weight: bold;
    color: #ffeb3b;
}

/* ===== RAIN ===== */
.rain {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
}

.drop {
    position: absolute;
    top: -20px;
    width: 3px;
    height: 8px;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
    animation: fall linear infinite;
}

@keyframes fall {
    0% { transform: translateY(0); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translateY(100vh); opacity: 0; }
}

</style>
</head>

<body>

<div class="rain"></div>

<div class="page">


    <div class="welcome-header">
        <h1>✨ Welcome to Shine Master ✨</h1>
    </div>

    <form action="/new_booking" method="POST" class="container">

        <label>Car Plate</label>
        <input type="text" name="car_plate" required>

        <label>Car Type</label>
        <select name="car_type" id="car_type" onchange="calculatePrice()">
            <option value="Sedan">Sedan</option>
            <option value="SUV_MPV">SUV / MPV</option>
            <option value="LARGE-MPV_4X4">LARGE-MPV / 4X4</option>
        </select>

        <label>Service</label>
        <select name="service_type" id="service_type" onchange="calculatePrice()">
            <option value="disp1">DISPO Coating 1 Year</option>
        </select>

        <!-- CALENDAR -->
        <div class="calendar-header">
            <button type="button" onclick="prevWeek()">‹</button>
            <div id="monthLabel" class="month-label">Month</div>
            <button type="button" onclick="nextWeek()">›</button>
        </div>

        <div class="calendar-wrapper">
            <div class="calendar-track" id="calendar"></div>
        </div>

        <input type="hidden" name="booking_date" id="booking_date">

        <!-- MODE -->
        <label>Service Mode</label>
        <div class="options">
            <div class="option" onclick="selectMode(this)">
                SELF DROP
                <input type="radio" name="service_mode" value="SELF_DROP" hidden>
            </div>

            <div class="option" onclick="selectMode(this)">
                PICKUP
                <input type="radio" name="service_mode" value="PICKUP" hidden>
            </div>
        </div>

        <label>Contact</label>
        <input type="text" name="contact" required>

        <div class="price-box">
            RM <span id="price_display">0.00</span>
        </div>

        <input type="hidden" name="price" id="price">

        <button type="submit" class="submit-btn">Confirm Booking</button>

    </form>

</div>

<script>

/* PRICE */
const priceTable = {
    disp1: { Sedan:488, SUV_MPV:588, "LARGE-MPV_4X4":688 }
};

function calculatePrice(){
    let service = document.getElementById("service_type").value;
    let car = document.getElementById("car_type").value;

    let price = priceTable[service][car] || 0;

    document.getElementById("price_display").innerText = price.toFixed(2);
    document.getElementById("price").value = price;
}

/* MODE */
function selectMode(el){
    document.querySelectorAll('.option').forEach(x=>x.classList.remove('selected'));
    el.classList.add('selected');
    el.querySelector('input').checked = true;
}

/* CALENDAR */
let startDate = new Date();

function generateWeek(){
    const cal = document.getElementById("calendar");
    cal.innerHTML = "";

    for(let i=0;i<7;i++){
        let d = new Date(startDate);
        d.setDate(d.getDate()+i);

        let dateStr = d.toISOString().split('T')[0];

        let div = document.createElement("div");
        div.className = "day";

        div.innerHTML = `
            <div>${d.toLocaleDateString('en-US',{weekday:'short'})}</div>
            <div>${d.getDate()}</div>
        `;

        div.onclick = () => {
            document.querySelectorAll('.day').forEach(x=>x.classList.remove('selected'));
            div.classList.add('selected');
            document.getElementById("booking_date").value = dateStr;
        };

        cal.appendChild(div);
    }

    updateMonthLabel(startDate);
}

function updateMonthLabel(date){
    const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    document.getElementById("monthLabel").innerText =
        months[date.getMonth()] + " " + date.getFullYear();
}

function prevWeek(){
    startDate.setDate(startDate.getDate()-7);
    generateWeek();
}

function nextWeek(){
    startDate.setDate(startDate.getDate()+7);
    generateWeek();
}

/* INIT */
document.addEventListener("DOMContentLoaded", ()=>{
    generateWeek();
    calculatePrice();
});

/* RAIN */
for (let i = 0; i < 80; i++) {
    let drop = document.createElement("div");
    drop.classList.add("drop");

    drop.style.left = Math.random() * 100 + "vw";
    drop.style.animationDuration = (0.5 + Math.random()) + "s";

    document.querySelector(".rain").appendChild(drop);
}

</script>

</body>
</html>
