{% extends "base.html" %}
{% block title %}Edit Inventory{% endblock %}

{% block content %}

<h2>Edit Inventory Item</h2>

<form method="POST">
    <label>Item:</label><br>
    <input type="text" name="item" value="{{ item.item }}" required><br>

    <label>Company:</label><br>
    <input type="text" name="company" value="{{ item.company }}"><br>

    <label>Phone:</label><br>
    <input type="text" name="phone" value="{{ item.phone }}"><br>

    <label>Address:</label><br>
    <input type="text" name="address" value="{{ item.address }}"><br>

    <label>Purchase Date:</label><br>
    <input type="date" name="purchase_date" value="{{ item.purchase_date }}"><br>

    <label>Quantity:</label><br>
    <input type="number" name="quantity" value="{{ item.quantity }}"><br>

    <label>Price:</label><br>
    <input type="number" step="0.01" name="price" value="{{ item.price }}"><br>

    <label>Serial Number:</label><br>
    <input type="text" name="serial_number" value="{{ item.serial_number }}"><br>

    <button type="submit">Update Item</button>
</form>

{% endblock %}
