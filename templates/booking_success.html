<!DOCTYPE html>
<html>
<head>
    <title>Booking Success</title>

    <!-- ✅ IMPORTANT FOR MOBILE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: radial-gradient(circle, #111, #000);
            color: white;
            /* ❌ removed overflow hidden */
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .center {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* better for mobile */
            padding: 15px;
        }

        .card {
            background: rgba(255,255,255,0.08);
            padding: 20px;
            border-radius: 18px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0,255,200,0.3);
            animation: popIn 0.8s ease;
        }

        @keyframes popIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        h2 {
            color: #00ffcc;
            font-size: 22px;
        }

        p {
            font-size: 14px;
            margin: 8px 0;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #00ffcc;
            font-weight: bold;
            width: 100%;
            font-size: 14px;
        }

        button:hover {
            background: #00c9a7;
        }

        /* 📱 SMALL DEVICES */
        @media (max-width: 400px) {
            h2 {
                font-size: 18px;
            }

            p {
                font-size: 13px;
            }

            .card {
                padding: 15px;
            }
        }
    </style>
</head>

<body>
<canvas id="fx"></canvas>

<div class="center">
    <div class="card">
        <h2>🎉 Booking Confirmed</h2>

        <p><b>Service:</b> Dispo Graphene Coating - DISCOUNT RM200</p>
        <p><b>Plate No:</b> {{ car_plate }}</p>
        <p><b>Type:</b> {{ car_type }}</p>
        <p><b>Date:</b> {{ date }}</p>

        <div class="btn-group">
            <a href="/launch_page"><button>View Other Packages</button></a>
            <a href="/new_booking"><button>New Booking</button></a>
        </div>
    </div>
</div>

<audio autoplay>
    <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("fx");
const ctx = canvas.getContext("2d");

/* ✅ RESPONSIVE CANVAS */
function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let particles = [];
let confetti = [];

class Firework {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = Math.random() * 3 + 1;
        this.color = `hsl(${Math.random()*360},100%,60%)`;
        this.speedX = (Math.random() - 0.5) * 10;
        this.speedY = (Math.random() - 0.5) * 10;
        this.alpha = 1;
    }

    update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.alpha -= 0.015;
    }

    draw() {
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

class Confetti {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height - canvas.height;
        this.size = Math.random() * 6 + 4;
        this.speedY = Math.random() * 3 + 2;
        this.color = `hsl(${Math.random()*360},100%,60%)`;
    }

    update() {
        this.y += this.speedY;
        if (this.y > canvas.height) {
            this.y = -10;
            this.x = Math.random() * canvas.width;
        }
    }

    draw() {
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.size, this.size);
    }
}

function burst() {
    let x = Math.random() * canvas.width;
    let y = Math.random() * canvas.height / 2;

    for (let i = 0; i < 60; i++) {
        particles.push(new Firework(x, y));
    }
}

for (let i = 0; i < 120; i++) {
    confetti.push(new Confetti());
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach((p, i) => {
        p.update();
        p.draw();
        if (p.alpha <= 0) particles.splice(i, 1);
    });

    confetti.forEach(c => {
        c.update();
        c.draw();
    });

    requestAnimationFrame(animate);
}

setInterval(burst, 700);
animate();
</script>
</body>
</html>
