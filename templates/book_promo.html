<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shine Master Solution - Book DISPO Coating 1 Year</title>

<style>
/* ===== BODY ===== */
body {
    font-family: Arial, sans-serif;
    background: #000;
    margin: 0;
    padding: 0;
    color: #fff;

    display: flex;
    flex-direction: column;
    align-items: center;
}

/* ===== GLOW HEADER ===== */
.glow-box-wrapper {
    width: 100%;
    display: flex;
    justify-content: center;
    margin-top: 20px;
    margin-bottom: 20px;
}

.glow-box {
    display: inline-block;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    color: #fff;
    background: rgba(106, 27, 154, 0.5);
    padding: 6px 16px;
    border-radius: 8px;
    box-shadow: 0 0 6px #fff, 0 0 12px #FFD700, 0 0 18px #6A1B9A;
    animation: pulseGlow 1.8s infinite alternate;
}

@keyframes pulseGlow {
    0% {
        box-shadow: 0 0 6px #fff, 0 0 12px #FFD700, 0 0 18px #6A1B9A;
    }
    50% {
        box-shadow: 0 0 8px #fff, 0 0 16px #FFD700, 0 0 22px #6A1B9A;
    }
    100% {
        box-shadow: 0 0 6px #fff, 0 0 12px #FFD700, 0 0 18px #6A1B9A;
    }
}

/* ===== CONTAINER ===== */
.container {
    width: 100%;
    max-width: 480px;
    margin: 20px auto;
    background: #1a1a1a;
    padding: 20px;
    border-radius: 12px;
    border: 2px solid #ffeb3b;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

/* ===== LABELS ===== */
label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
    color: #ffeb3b;
}

/* ===== INPUTS ===== */
input[type=text], select, input[type=date] {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 6px;
    border: 1px solid #9c27b0;
    background: #222;
    color: #fff;
}

/* ===== TIMESLOTS ===== */
.timeslots {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 10px;
}

.timeslot {
    padding: 10px 12px;
    margin: 5px;
    border-radius: 6px;
    border: 1px solid #9c27b0;
    cursor: pointer;
    color: white;
    font-weight: bold;
    transition: 0.2s;
}

.timeslot.selected {
    background-color: #9c27b0;
    border-color: #ffeb3b;
}

.timeslot.disabled {
    background-color: #555 !important;
    color: #aaa !important;
    border-color: #444 !important;
    cursor: not-allowed;
    pointer-events: none;
    opacity: 0.4;
}

/* ===== PRICE BOX ===== */
.price-box {
    margin-top: 20px;
    font-size: 22px;
    font-weight: bold;
    color: #ffeb3b;
    text-align: center;
    background: #222;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #9c27b0;
}

/* ===== BUTTON ===== */
button {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    background: linear-gradient(90deg,#9c27b0,#ffeb3b);
    border: none;
    border-radius: 6px;
    color: black;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: linear-gradient(90deg,#ffeb3b,#9c27b0);
    transform: translateY(-2px);
}

/* ===== FOOTER ===== */
.footer {
    text-align: center;
    font-size: 12px;
    margin-top: 15px;
    color: #ccc;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="glow-box-wrapper">
    <div class="glow-box">Shine Master Solution</div>
</div>

<!-- FORM -->
<form action="/book_promo" method="POST" class="container">

    <label>Car Plate</label>
    <input type="text" name="car_plate" value="{{ plate }}" required>

    <label>Car Type</label>
    <select name="car_type" id="car_type" onchange="calculatePrice()" required>
        <option value="Sedan">Sedan</option>
        <option value="SUV_MPV">SUV / MPV</option>
        <option value="LARGE-MPV_4X4">LARGE-MPV / 4X4</option>
    </select>

    <label>Service Type</label>
    <select name="service_type" id="service_type" onchange="calculatePrice()" required>
        <optgroup label="Special Promotion">
            <option value="disp1">DISPO Coating Promo Package - 1 YEAR</option>
        </optgroup>
    </select>

    <label>Pick a Date</label>
    <input type="date" name="booking_date" required min="{{ current_date }}">

    <label>Pick a Time Slot</label>
    <div class="timeslots">
        {% for slot in timeslots %}
        <div class="timeslot {% if slot in disabled_slots %}disabled{% endif %}"
             onclick="selectSlot(this)">
            {{ slot }}
            <input type="radio" name="booking_time" value="{{ slot }}" hidden
                   {% if slot in disabled_slots %}disabled{% endif %}>
        </div>
        {% endfor %}
    </div>

    <label>Contact Number</label>
    <input type="text" name="contact" placeholder="e.g 018-1234567" required>

    <button type="submit">Confirm Booking</button>

</form>

<div class="footer">
    @Shine Master Solution - Powered by AsliTech
</div>

<script>
const priceTable = {
    wash_basic: { Sedan:20, SUV_MPV:24, "LARGE-MPV_4X4":28 },
    wash_special: { Sedan:48, SUV_MPV:58, "LARGE-MPV_4X4":68 },
    wash_maintain: { Sedan:98, SUV_MPV:108, "LARGE-MPV_4X4":118 },
    coat1: { Sedan:488, SUV_MPV:588, "LARGE-MPV_4X4":688 },
    coat2: { Sedan:688, SUV_MPV:788, "LARGE-MPV_4X4":888 },
    coat3: { Sedan:888, SUV_MPV:988, "LARGE-MPV_4X4":1088 },
    disp1: { Sedan:488, SUV_MPV:588, "LARGE-MPV_4X4":688 },
    disp2: { Sedan:588, SUV_MPV:688, "LARGE-MPV_4X4":788 },
    disp3: { Sedan:688, SUV_MPV:788, "LARGE-MPV_4X4":888 },
    wax: { Sedan:288, SUV_MPV:388, "LARGE-MPV_4X4":488 },
    int_detail: { Sedan:188, SUV_MPV:288, "LARGE-MPV_4X4":388 },
    int_coat: { Sedan:288, SUV_MPV:388, "LARGE-MPV_4X4":488 }
};

function calculatePrice() {
    const service = document.getElementById("service_type").value;
    const carType = document.getElementById("car_type").value;

    const priceDisplay = document.getElementById("price_display");
    const hiddenPrice = document.getElementById("price");

    if (priceTable[service] && priceTable[service][carType]) {
        const price = priceTable[service][carType];
        priceDisplay.textContent = price.toFixed(2);
        hiddenPrice.value = price;
    } else {
        priceDisplay.textContent = "0.00";
        hiddenPrice.value = 0;
    }
}

function selectSlot(el) {
    document.querySelectorAll('.timeslot').forEach(x => x.classList.remove('selected'));
    el.classList.add('selected');
    el.querySelector('input').checked = true;
}

document.addEventListener("DOMContentLoaded", calculatePrice);
</script>

</body>
</html>
