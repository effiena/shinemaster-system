<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Confirmed</title>
<style>
/* ===== Body Background ===== */
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1a001a, #330033);
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    overflow: hidden;
}

/* ===== Shimmer Animation ===== */
@keyframes shimmer {
    0% {background-position: -500px 0;}
    100% {background-position: 500px 0;}
}
body::before {
    content: '';
    position: absolute;
    top:0; left:0;
    width:100%; height:100%;
    background: linear-gradient(120deg, rgba(255,255,255,0.05) 30%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0.05) 70%);
    background-size: 1000px 100%;
    animation: shimmer 6s infinite linear;
    z-index:0;
}

/* ===== Container ===== */
.container {
    position: relative;
    z-index: 1;
    text-align: center;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px);
    padding: 30px 40px;
    border-radius: 20px;
    box-shadow: 0 0 25px rgba(255, 255, 255, 0.1);
    max-width: 400px;
}

/* ===== Title ===== */
h1 {
    font-size: 32px;
    color: #FFD700;
    text-shadow: 0 0 10px #FFD700, 0 0 20px #FFDF80, 0 0 30px #FFD700;
    margin-bottom: 25px;
    animation: pulseTitle 2s infinite alternate;
}
@keyframes pulseTitle {
    0% { text-shadow: 0 0 10px #FFD700,0 0 20px #FFDF80,0 0 30px #FFD700; }
    100% { text-shadow: 0 0 20px #FFD700,0 0 35px #FFDF80,0 0 50px #FFD700; }
}

/* ===== Booking Card ===== */
.card {
    background: rgba(255, 255, 255, 0.1);
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 25px;
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
}
.card p, .card p strong, .card p a {
    color: #fff !important;
}

/* ===== Checkmark ===== */
.checkmark {
    font-size: 120px;
    color: #FFD700;
    text-shadow: 0 0 20px #FFD700,0 0 40px #FFDF80,0 0 60px #FFD700;
    animation: pulseCheck 2s infinite alternate;
    margin-bottom: 40px;
}
@keyframes pulseCheck {
    0% { transform: scale(1); text-shadow:0 0 20px #FFD700,0 0 40px #FFDF80,0 0 60px #FFD700; }
    50% { transform: scale(1.2); text-shadow:0 0 40px #FFD700,0 0 80px #FFDF80,0 0 120px #FFD700; }
    100% { transform: scale(1); text-shadow:0 0 20px #FFD700,0 0 40px #FFDF80,0 0 60px #FFD700; }
}

/* ===== Button ===== */
button {
    padding: 12px 20px;
    font-size: 16px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #6A1B9A, #FFD700);
    color: #fff;
    cursor: pointer;
    box-shadow: 0 0 10px #FFD700;
    transition: all 0.3s ease;
}
button:hover { opacity:0.9; transform:scale(1.05); }

/* ===== Fireworks ===== */
.fireworks {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
}

.firework {
    position: absolute;
    width: 8px;
    height: 8px;
    background: gold;
    border-radius: 50%;
    animation: explode 1.5s ease-out forwards;
}

/* Explosion animation will be handled via JS for random sparks */
@keyframes explode {
    0% { transform: translate(0,0) scale(0.5); opacity:1; }
    100% { transform: translate(var(--x), var(--y)) scale(1.5); opacity:0; }
}
</style>
</head>
<body>

<div class="container">
    <h1>CONFIRMED BOOKING</h1>
    <div class="card">
        <p><strong>Car Plate:</strong> {{ booking['car_plate'] }}</p>
        <p><strong>Service:</strong> {{ booking['service'] }}</p>
        <p><strong>Date:</strong> {{ booking['date'] }}</p>
        <p><strong>Time:</strong> {{ booking['time'] }}</p>
        <p><strong>Contact:</strong> {{ booking['contact'] }}</p>
        <p><strong>Booking ID:</strong> {{ booking['booking_id'] }}</p>
    </div>
    <div class="checkmark">✔️</div>
    <button onclick="window.location.href='/booking'">Return Booking</button>
</div>

<!-- Fireworks container -->
<div class="fireworks" id="fireworks"></div>

<script>
// ===== Fireworks JS =====
function createFirework() {
    const fw = document.createElement('div');
    fw.classList.add('firework');

    // Random starting position
    const startX = Math.random() * window.innerWidth;
    const startY = window.innerHeight;
    fw.style.left = `${startX}px`;
    fw.style.bottom = `0px`;

    // Random explosion directions
    const x = (Math.random()-0.5)*300; // random left/right
    const y = - (100 + Math.random()*300); // upward

    fw.style.setProperty('--x', `${x}px`);
    fw.style.setProperty('--y', `${y}px`);

    document.getElementById('fireworks').appendChild(fw);

    // Remove after animation
    setTimeout(() => fw.remove(), 1500);
}

// Spawn fireworks every 300ms
setInterval(createFirework, 300);
</script>

</body>
</html>
