    100% { text-shadow: 0 0 20px #FFD700, 0 0 35px #FFDF80, 0 0 50px #FFD700; }
}

        padding: 20px;

    }
}

@media screen and (max-width: 480px) {
    .container {
        padding: 20px;
        width: 90%;
    }
}

/* ===== Booking Card ===== */
.card {
    background: rgba(255, 255, 255, 0.1);
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 25px;
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
}
.card p {
    margin: 10px 0;
    font-size: 18px;
}

.card p, .card p strong {
    color: #fff !important; /* All text white */
}

.card p a {
    color: #fff !important; /* Contact links white */
    text-decoration: none;
}

/* ===== Glowing Checkmark ===== */
.checkmark {
    font-size: 60px;
    color: #FFD700;
    text-shadow: 0 0 15px #FFD700, 0 0 30px #FFDF80, 0 0 45px #FFD700;
    animation: pulseCheck 1.8s infinite alternate;
    margin-bottom: 25px;
}
@keyframes pulseCheck {
    0% { text-shadow: 0 0 15px #FFD700, 0 0 30px #FFDF80, 0 0 45px #FFD700; transform: scale(1); }
    50% { text-shadow: 0 0 25px #FFD700, 0 0 50px #FFDF80, 0 0 70px #FFD700; transform: scale(1.1); }
    100% { text-shadow: 0 0 15px #FFD700, 0 0 30px #FFDF80, 0 0 45px #FFD700; transform: scale(1); }
}

/* ===== Button ===== */
button {
    padding: 12px 20px;
    font-size: 16px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #6A1B9A, #FFD700);
    color: #fff;
    cursor: pointer;
    box-shadow: 0 0 10px #FFD700;
    transition: all 0.3s ease;
}
button:hover {
    opacity: 0.9;
    transform: scale(1.05);
}

/* ===== Responsive ===== */
@media screen and (max-width: 400px) {
    .container { padding: 25px; }
    h1 { font-size: 24px; }
    .card p { font-size: 16px; }
    .checkmark { font-size: 50px; }
    button { font-size: 14px; padding: 10px; }
}

/* ===== Glowing Gold Checkmark ===== */
.checkmark {
    font-size: 120px; /* bigger */
    color: #FFD700; /* gold */
    text-shadow: 
        0 0 20px #FFD700, 
        0 0 40px #FFDF80, 
        0 0 60px #FFD700, 
        0 0 80px #FFD700, 
        0 0 100px #FFD700;
    animation: pulseCheck 2s infinite alternate, sparkle 3s infinite linear;
    margin-bottom: 40px;
}

/* Pulse animation for glow */
@keyframes pulseCheck {
    0% { transform: scale(1); text-shadow: 0 0 20px #FFD700,0 0 40px #FFDF80,0 0 60px #FFD700; }
    50% { transform: scale(1.15); text-shadow: 0 0 40px #FFD700,0 0 80px #FFDF80,0 0 120px #FFD700; }
    100% { transform: scale(1); text-shadow: 0 0 20px #FFD700,0 0 40px #FFDF80,0 0 60px #FFD700; }
}

/* Optional subtle sparkle effect */
@keyframes sparkle {
    0%,100% { text-shadow: 0 0 20px #FFD700,0 0 40px #FFDF80,0 0 60px #FFD700; }
    25% { text-shadow: 0 0 30px #FFD700,0 0 60px #FFDF80,0 0 90px #FFD700; }
    50% { text-shadow: 0 0 50px #FFD700,0 0 100px #FFDF80,0 0 150px #FFD700; }
    75% { text-shadow: 0 0 30px #FFD700,0 0 60px #FFDF80,0 0 90px #FFD700; }
}


/* ===== Fireworks Animation ===== */
.fireworks {
    position: relative;
    width: 100%;
    height: 200px;
    margin-top: 20px;
    overflow: visible;
}

.firework {
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 8px;
    height: 8px;
    background: gold;
    border-radius: 50%;
    animation: explode 1.5s ease-out infinite;
}

.firework:nth-child(1) { left: 20%; animation-delay: 0s; }
.firework:nth-child(2) { left: 40%; animation-delay: 0.3s; }
.firework:nth-child(3) { left: 60%; animation-delay: 0.6s; }
.firework:nth-child(4) { left: 80%; animation-delay: 0.9s; }
.firework:nth-child(5) { left: 50%; animation-delay: 1.2s; }

@keyframes explode {
    0% {
        transform: translateY(0) scale(0.5);
        opacity: 1;
        box-shadow: 0 0 0 gold, 0 0 0 gold, 0 0 0 gold;
    }
    50% {
        transform: translateY(-100px) scale(1.5);
        box-shadow:
            0 -30px 4px gold,
            20px -20px 4px gold,
            -20px -20px 4px gold,
            30px 0px 4px gold,
            -30px 0px 4px gold,
            20px 20px 4px gold,
            -20px 20px 4px gold,
            0 30px 4px gold;
        opacity: 1;
    }
    100% {
        transform: translateY(-150px) scale(0.5);
        opacity: 0;
        box-shadow: 0 0 0 gold, 0 0 0 gold, 0 0 0 gold;
    }
}

</style>

<div class="container">
    <h1>CONFIRMED BOOKING</h1>
    <div class="card">
        <p><strong>Car Plate:</strong> {{ booking['car_plate'] }}</p>
        <p><strong>Service:</strong> {{ booking['service'] }}</p>
        <p><strong>Date:</strong> {{ booking['date'] }}</p>
        <p><strong>Time:</strong> {{ booking['time'] }}</p>
        <p><strong>Contact:</strong> {{ booking['contact'] }}</p>
        <p><strong>Booking ID:</strong> {{ booking['booking_id'] }}</p>
    </div>
    <div class="checkmark">✔️</div>

<!-- Fireworks effect -->
<div class="fireworks">
    <div class="firework"></div>
    <div class="firework"></div>
    <div class="firework"></div>
    <div class="firework"></div>
    <div class="firework"></div>
</div>
</div>
